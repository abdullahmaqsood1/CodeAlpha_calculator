<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumière — Image Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1a1a1a;
      --border: rgba(255,255,255,0.07);
      --accent: #c9a84c;
      --accent2: #e8c87a;
      --text: #f0ede6;
      --muted: #7a7570;
      --radius: 4px;
      --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      padding: 3rem 2rem 1.5rem;
      text-align: center;
      position: relative;
    }
    header::after {
      content: '';
      display: block;
      width: 60px;
      height: 1px;
      background: var(--accent);
      margin: 1.5rem auto 0;
    }
    .site-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--text);
    }
    .site-title em { color: var(--accent); font-style: italic; }
    .site-sub {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    /* ── FILTERS ── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      padding: 2rem 1.5rem 1rem;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.5rem 1.2rem;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0d0d;
      font-weight: 600;
    }

    /* ── GALLERY GRID ── */
    .gallery-wrap {
      padding: 1.5rem 2rem 4rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--card);
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform var(--transition), box-shadow var(--transition), opacity 0.35s ease;
      animation: fadeIn 0.5s ease both;
    }
    .card.hidden { display: none; }
    .card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 0 1px var(--accent);
    }
    .card-img-wrap {
      width: 100%;
      aspect-ratio: 3/2;
      overflow: hidden;
      position: relative;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s ease;
      filter: brightness(0.88) saturate(0.9);
    }
    .card:hover .card-img-wrap img {
      transform: scale(1.08);
      filter: brightness(1) saturate(1.1);
    }
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.35s ease;
      display: flex;
      align-items: flex-end;
      padding: 1.2rem;
    }
    .card:hover .card-overlay { opacity: 1; }
    .card-overlay-inner { display: flex; align-items: center; gap: 0.6rem; }
    .zoom-icon {
      width: 32px; height: 32px;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 0.9rem;
    }
    .card-meta {
      padding: 0.85rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text);
    }
    .card-tag {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* tall card for masonry feel */
    .card.tall .card-img-wrap { aspect-ratio: 2/3; }

    /* ── LIGHTBOX ── */
    .lb-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8,8,8,0.96);
      backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .lb-overlay.open { opacity: 1; pointer-events: all; }
    .lb-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .lb-img-wrap {
      position: relative;
      max-height: 78vh;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
    }
    .lb-img-wrap img {
      display: block;
      max-width: 85vw;
      max-height: 78vh;
      object-fit: contain;
      transition: opacity 0.3s ease;
    }
    .lb-caption {
      margin-top: 1.2rem;
      text-align: center;
    }
    .lb-caption h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.3rem;
      color: var(--text);
    }
    .lb-caption span {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .lb-counter {
      margin-top: 0.7rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
    }
    .lb-close {
      position: fixed;
      top: 1.5rem; right: 1.8rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 1.1rem;
      width: 44px; height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.2s;
      z-index: 1010;
    }
    .lb-close:hover { border-color: var(--accent); color: var(--accent); }
    .lb-nav {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      background: rgba(20,20,20,0.7);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.2rem;
      width: 52px; height: 52px;
      border-radius: 50%;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.25s;
      z-index: 1010;
      backdrop-filter: blur(6px);
    }
    .lb-nav:hover { background: var(--accent); color: #0d0d0d; border-color: var(--accent); }
    .lb-prev { left: 1.2rem; }
    .lb-next { right: 1.2rem; }

    /* ── NO RESULTS ── */
    .no-results {
      text-align: center;
      padding: 4rem 1rem;
      display: none;
      color: var(--muted);
    }
    .no-results.show { display: block; }
    .no-results p { font-size: 0.85rem; letter-spacing: 0.1em; }

    /* ── ANIMATION ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 0.7rem; }
      .gallery-wrap { padding: 1rem 0.9rem 3rem; }
      .lb-nav { width: 40px; height: 40px; font-size: 1rem; }
      .lb-prev { left: 0.4rem; }
      .lb-next { right: 0.4rem; }
    }
    @media (max-width: 380px) {
      .gallery-grid { grid-template-columns: 1fr; }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <p class="site-sub">A Visual Collection</p>
  <h1 class="site-title">Lumi<em>ère</em></h1>
</header>

<!-- FILTER BAR -->
<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="nature">Nature</button>
  <button class="filter-btn" data-filter="architecture">Architecture</button>
  <button class="filter-btn" data-filter="portrait">Portrait</button>
  <button class="filter-btn" data-filter="abstract">Abstract</button>
  <button class="filter-btn" data-filter="urban">Urban</button>
</div>

<!-- GALLERY -->
<div class="gallery-wrap">
  <div class="gallery-grid" id="gallery"></div>
  <div class="no-results" id="noResults"><p>No images in this category.</p></div>
</div>

<!-- LIGHTBOX -->
<div class="lb-overlay" id="lightbox">
  <button class="lb-close" id="lbClose" title="Close">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev" title="Previous">&#8592;</button>
  <button class="lb-nav lb-next" id="lbNext" title="Next">&#8594;</button>
  <div class="lb-inner">
    <div class="lb-img-wrap"><img id="lbImg" src="" alt=""/></div>
    <div class="lb-caption">
      <h3 id="lbTitle"></h3>
      <span id="lbTag"></span>
    </div>
    <div class="lb-counter" id="lbCounter"></div>
  </div>
</div>

<script>
  // ── DATA: Using picsum for placeholder images ──
  const images = [
    { id:1,  src:'https://picsum.photos/seed/forest1/800/600',   thumb:'https://picsum.photos/seed/forest1/600/400',   title:'Emerald Canopy',       cat:'nature',       tall:false },
    { id:2,  src:'https://picsum.photos/seed/arch22/800/1100',   thumb:'https://picsum.photos/seed/arch22/600/800',    title:'The Atrium',           cat:'architecture', tall:true  },
    { id:3,  src:'https://picsum.photos/seed/face1/800/600',     thumb:'https://picsum.photos/seed/face1/600/400',     title:'Golden Hour',          cat:'portrait',     tall:false },
    { id:4,  src:'https://picsum.photos/seed/abstract99/800/600',thumb:'https://picsum.photos/seed/abstract99/600/400',title:'Chromatic Drift',      cat:'abstract',     tall:false },
    { id:5,  src:'https://picsum.photos/seed/city55/800/600',    thumb:'https://picsum.photos/seed/city55/600/400',    title:'Rain Street',          cat:'urban',        tall:false },
    { id:6,  src:'https://picsum.photos/seed/lake88/800/1100',   thumb:'https://picsum.photos/seed/lake88/600/800',    title:'Mirror Lake',          cat:'nature',       tall:true  },
    { id:7,  src:'https://picsum.photos/seed/build3/800/600',    thumb:'https://picsum.photos/seed/build3/600/400',    title:'Glass & Steel',        cat:'architecture', tall:false },
    { id:8,  src:'https://picsum.photos/seed/portrait7/800/600', thumb:'https://picsum.photos/seed/portrait7/600/400', title:'Silhouette Study',     cat:'portrait',     tall:false },
    { id:9,  src:'https://picsum.photos/seed/art44/800/600',     thumb:'https://picsum.photos/seed/art44/600/400',     title:'Fluid Forms',          cat:'abstract',     tall:false },
    { id:10, src:'https://picsum.photos/seed/subway1/800/1100',  thumb:'https://picsum.photos/seed/subway1/600/800',   title:'Metro Lights',         cat:'urban',        tall:true  },
    { id:11, src:'https://picsum.photos/seed/mist33/800/600',    thumb:'https://picsum.photos/seed/mist33/600/400',    title:'Morning Mist',         cat:'nature',       tall:false },
    { id:12, src:'https://picsum.photos/seed/tower2/800/600',    thumb:'https://picsum.photos/seed/tower2/600/400',    title:'Vertical Lines',       cat:'architecture', tall:false },
    { id:13, src:'https://picsum.photos/seed/port9/800/1100',    thumb:'https://picsum.photos/seed/port9/600/800',     title:'Wabi-Sabi',            cat:'portrait',     tall:true  },
    { id:14, src:'https://picsum.photos/seed/neon22/800/600',    thumb:'https://picsum.photos/seed/neon22/600/400',    title:'Neon Bloom',           cat:'abstract',     tall:false },
    { id:15, src:'https://picsum.photos/seed/market1/800/600',   thumb:'https://picsum.photos/seed/market1/600/400',   title:'The Market',           cat:'urban',        tall:false },
    { id:16, src:'https://picsum.photos/seed/valley7/800/600',   thumb:'https://picsum.photos/seed/valley7/600/400',   title:'Valley Floor',         cat:'nature',       tall:false },
  ];

  let currentFilter = 'all';
  let visibleImages = [...images];
  let lightboxIndex = 0;

  // ── BUILD GRID ──
  const gallery = document.getElementById('gallery');
  const noResults = document.getElementById('noResults');

  function buildGrid() {
    gallery.innerHTML = '';
    visibleImages = currentFilter === 'all'
      ? images
      : images.filter(img => img.cat === currentFilter);

    noResults.classList.toggle('show', visibleImages.length === 0);

    visibleImages.forEach((img, idx) => {
      const card = document.createElement('div');
      card.className = 'card' + (img.tall ? ' tall' : '');
      card.style.animationDelay = `${idx * 0.06}s`;
      card.innerHTML = `
        <div class="card-img-wrap">
          <img src="${img.thumb}" alt="${img.title}" loading="lazy"/>
          <div class="card-overlay">
            <div class="card-overlay-inner">
              <div class="zoom-icon">⊕</div>
            </div>
          </div>
        </div>
        <div class="card-meta">
          <span class="card-title">${img.title}</span>
          <span class="card-tag">${img.cat}</span>
        </div>`;
      card.addEventListener('click', () => openLightbox(idx));
      gallery.appendChild(card);
    });
  }

  // ── FILTERS ──
  document.getElementById('filterBar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    buildGrid();
  });

  // ── LIGHTBOX ──
  const lbOverlay = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lbImg');
  const lbTitle   = document.getElementById('lbTitle');
  const lbTag     = document.getElementById('lbTag');
  const lbCounter = document.getElementById('lbCounter');

  function openLightbox(idx) {
    lightboxIndex = idx;
    updateLightbox();
    lbOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lbOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    const img = visibleImages[lightboxIndex];
    lbImg.style.opacity = '0';
    setTimeout(() => {
      lbImg.src = img.src;
      lbImg.alt = img.title;
      lbImg.onload = () => { lbImg.style.opacity = '1'; };
      lbTitle.textContent = img.title;
      lbTag.textContent = img.cat;
      lbCounter.textContent = `${lightboxIndex + 1} / ${visibleImages.length}`;
    }, 150);
  }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);

  document.getElementById('lbPrev').addEventListener('click', () => {
    lightboxIndex = (lightboxIndex - 1 + visibleImages.length) % visibleImages.length;
    updateLightbox();
  });

  document.getElementById('lbNext').addEventListener('click', () => {
    lightboxIndex = (lightboxIndex + 1) % visibleImages.length;
    updateLightbox();
  });

  // Click outside image to close
  lbOverlay.addEventListener('click', e => {
    if (e.target === lbOverlay) closeLightbox();
  });

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (!lbOverlay.classList.contains('open')) return;
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowLeft')  { lightboxIndex = (lightboxIndex - 1 + visibleImages.length) % visibleImages.length; updateLightbox(); }
    if (e.key === 'ArrowRight') { lightboxIndex = (lightboxIndex + 1) % visibleImages.length; updateLightbox(); }
  });

  // Touch swipe for lightbox
  let touchStartX = 0;
  lbOverlay.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  lbOverlay.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) { lightboxIndex = (lightboxIndex + 1) % visibleImages.length; }
      else          { lightboxIndex = (lightboxIndex - 1 + visibleImages.length) % visibleImages.length; }
      updateLightbox();
    }
  });

  // ── INIT ──
  buildGrid();
</script>
</body>
</html>
